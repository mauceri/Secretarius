# install.conf — Configuration par défaut pour l'installation de Secretarius
# Sourcé par install.sh et openclaw-config/install.sh

SECRETARIUS_VERSION="0.1.0"

# Chemin du coffre Obsidian
OBSIDIAN_PATH="${OBSIDIAN_PATH:-$HOME/Documents/Obsidian}"

# Nom de l'assistant OpenClaw
ASSISTANT_NAME="${ASSISTANT_NAME:-Tiron}"

# Backend LLM par défaut : deepseek | ollama | local
LLM_BACKEND="${LLM_BACKEND:-deepseek}"

# Chemin où installer la config OpenClaw
OPENCLAW_PATH="${OPENCLAW_PATH:-$HOME/.openclaw}"

# Version minimale d'OpenClaw requise
OPENCLAW_MIN_VERSION="1.0.0"

# Chemins relatifs au repo
OPENCLAW_CONFIG_PATH="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)/openclaw-config"
WIKI_LM_PATH="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)/Wiki_LM"

# Cerveau Tiron (SLM) : URL du serveur llama.cpp (SANS /v1 final) et clé API.
# Local par défaut ; pour un cerveau distant (ex. Modal) :
#   TIRON_LLM_URL=https://<user>--tiron-llm-modal-serve.modal.run
#   TIRON_LLM_KEY=<clé du Secret Modal tiron-llm-api-key>
TIRON_LLM_URL="${TIRON_LLM_URL:-http://127.0.0.1:8998}"
TIRON_LLM_KEY="${TIRON_LLM_KEY:-local}"
